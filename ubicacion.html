<!-- 🎵 MÚSICA -->
<div class="musica-fija">
    <audio id="musica" controls>
        <source src="audio/lease.mp3" type="audio/mpeg">
    </audio>
</div>

<!-- SCRIPT MÚSICA -->
<script>
const musica = document.getElementById("musica");

window.addEventListener("load", () => {
    const tiempo = localStorage.getItem("tiempoMusica");
    if (tiempo) {
        musica.currentTime = tiempo;
    }
});

window.addEventListener("beforeunload", () => {
    localStorage.setItem("tiempoMusica", musica.currentTime);
});
</script>

<!-- SCRIPT MENÚ -->
<script>
function toggleMenu() {
    const menu = document.getElementById("menu");
    menu.classList.toggle("activo");
}
</script>
