<script>
const musica = document.getElementById("musica");

// Recuperar tiempo guardado
window.addEventListener("load", () => {
    const tiempo = localStorage.getItem("tiempoMusica");
    if (tiempo) {
        musica.currentTime = tiempo;
    }
});

// Guardar tiempo cuando cambias de página

    localStorage.setItem("tiempoMusica", musica.currentTime);
});
